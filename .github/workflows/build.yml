name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WebView2 SDK
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.2277.86 -OutputDirectory webview2
        shell: pwsh

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DWEBVIEW2_PATH=${{github.workspace}}/webview2/Microsoft.Web.WebView2.1.0.2277.86"

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Zip artifacts
        run: |
          Compress-Archive -Path build/OBSTACLE_artefacts/Release/VST3/* -DestinationPath Obstacle-Windows-VST3.zip
          Compress-Archive -Path build/OBSTACLE_artefacts/Release/Standalone/* -DestinationPath Obstacle-Windows-Standalone.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Obstacle-Windows
          path: |
            Obstacle-Windows-VST3.zip
            Obstacle-Windows-Standalone.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Zip artifacts
        run: |
          zip -r Obstacle-macOS-VST3.zip      build/OBSTACLE_artefacts/Release/VST3/
          zip -r Obstacle-macOS-AU.zip        build/OBSTACLE_artefacts/Release/AU/
          zip -r Obstacle-macOS-Standalone.zip build/OBSTACLE_artefacts/Release/Standalone/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Obstacle-macOS
          path: |
            Obstacle-macOS-VST3.zip
            Obstacle-macOS-AU.zip
            Obstacle-macOS-Standalone.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: Obstacle-Windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: Obstacle-macOS
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
